name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Django test suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build application image
        run: docker compose build web

      - name: Run Django checks
        run: docker compose run --rm web python manage.py check

      - name: Check for missing migrations
        run: docker compose run --rm web python manage.py makemigrations --check --dry-run

      - name: Run test suite
        run: docker compose run --rm web pytest

      - name: Validate OpenAPI schema
        run: docker compose run --rm web python manage.py spectacular --file /tmp/supportflow-schema.yml --validate

      - name: Run production deploy checks
        run: >
          docker compose run --rm
          -e DJANGO_SETTINGS_MODULE=config.settings.production
          -e SECRET_KEY=production-test-secret-key-with-more-than-fifty-characters-1234567890
          -e DEBUG=False
          -e ALLOWED_HOSTS=localhost
          -e CSRF_TRUSTED_ORIGINS=https://localhost
          -e CORS_ALLOWED_ORIGINS=https://localhost
          web python manage.py check --deploy
